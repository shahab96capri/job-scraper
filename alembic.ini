[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally NOT set here — it is injected at runtime
# by migrations/env.py from app.config.settings.get_settings(), so the
# database URL has exactly one source of truth across the whole platform
# (no drift between .env and alembic.ini).

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
